<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Swarm Evolution</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="canvas-col">
    <div class="header">
      <span data-i18n="header.title"></span>
      <span class="header-sub" data-i18n="header.subtitle"></span>
      <select id="lang-select" class="lang-select"></select>
    </div>
    <canvas id="canvas" width="1800" height="900"></canvas>
    <div class="buttons">
      <button id="btn-toggle" class="btn-pause" data-i18n="btn.pause"></button>
      <button id="btn-reset" class="btn-reset" data-i18n="btn.reset"></button>
      <input type="text" id="seed-input" class="seed-input" placeholder="Seed">
      <button id="btn-export" class="btn-export" data-i18n="btn.export_top10"></button>
      <button id="btn-export-run" class="btn-export-run" data-i18n="btn.export_run"></button>
      <button id="btn-export-csv" class="btn-export-csv" data-i18n="btn.export_csv"></button>
      <button id="btn-export-img" class="btn-export-img" data-i18n="btn.export_image"></button>
      <button id="btn-new-window" class="btn-new-window" data-i18n="btn.new_window"></button>
      <button id="btn-help" class="btn-help" data-i18n="btn.help"></button>
    </div>

    <div class="commentary-row">
      <div class="panel commentary-panel">
        <div class="panel-title title-user" data-i18n="panel.user_actions"></div>
        <div id="user-log" class="log"></div>
      </div>
      <div class="panel commentary-panel">
        <div class="panel-title title-dyn" data-i18n="panel.dynamics"></div>
        <div id="obs-log" class="log"></div>
      </div>
    </div>

    <div class="panel claude-panel">
      <div class="claude-header">
        <span data-i18n="panel.claude"></span>
        <button id="btn-claude" class="btn-claude" data-i18n="btn.ask_claude"></button>
      </div>
      <div id="claude-body" class="claude-body">
        <span class="empty" data-i18n="placeholder.claude_body"></span>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-title" data-i18n="panel.controls"></div>
      <div style="margin-bottom:10px">
        <label class="label"><span data-i18n="label.sim_speed"></span>: <span id="lbl-speed">1</span>x</label>
        <input type="range" id="sim-speed" min="1" max="8" value="1">
      </div>
      <div style="margin-bottom:10px">
        <label class="label"><span data-i18n="label.food"></span>: <span id="lbl-food">80</span></label>
        <input type="range" id="food-count" min="5" max="200" value="80">
      </div>
      <div style="margin-bottom:10px">
        <label class="label"><span data-i18n="label.predators"></span>: <span id="lbl-predators">2</span></label>
        <input type="range" id="predator-count" min="0" max="6" value="2">
      </div>
      <div>
        <label class="label"><span data-i18n="label.mutation"></span>: <span id="lbl-mutation">15</span>%</label>
        <input type="range" id="mutation-rate" min="0" max="50" value="15">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title" data-i18n="panel.population"></div>
      <div class="grid2">
        <div><div class="label" data-i18n="label.current"></div><div class="value" id="m-pop">0</div></div>
        <div><div class="label" data-i18n="label.avg_age"></div><div class="value" id="m-age">0</div></div>
        <div><div class="label" data-i18n="label.births"></div><div class="value" id="m-births">0</div></div>
        <div><div class="label" data-i18n="label.deaths"></div><div class="value" id="m-deaths">0</div></div>
        <div><div class="label" data-i18n="label.eaten"></div><div class="value" id="m-eaten">0</div></div>
        <div><div class="label" data-i18n="label.tick"></div><div class="value" id="m-tick">0</div></div>
      </div>
      <div style="margin-top:10px">
        <div class="label" data-i18n="label.pop_over_time"></div>
        <svg id="spark-pop" class="sparkline" width="140" height="24"></svg>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title" data-i18n="panel.genes"></div>
      <div id="genes-container"></div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
